[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "nlp2cmd-propact"
version = "0.1.3"
description = "Bridge ExecutionPlanIR to Propact markdown and execution"
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0"
dependencies = [
    "pact-ir>=0.1.0",
    "nlp2cmd-planner>=0.1.0",
    "pyyaml>=6.0",
    "pydantic>=2.0",
]

[project.optional-dependencies]
propact = ["propact>=0.0.9"]
nlp2cmd = ["nlp2cmd"]
dev = ["pytest>=8.0"]

[project.scripts]
nlp2dsl-run = "nlp2cmd_propact.cli:main"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src/nlp2cmd_propact"]

[tool.pytest.ini_options]
testpaths = ["tests"]
