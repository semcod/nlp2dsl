[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "nlp2cmd-planner"
version = "0.1.2"
description = "Plan strategies producing ExecutionPlanIR from IntentIR"
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0"
dependencies = [
    "pact-ir>=0.1.0",
    "nlp2cmd-intent>=0.1.1",
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src/nlp2cmd_planner"]

[tool.pytest.ini_options]
testpaths = ["tests"]
