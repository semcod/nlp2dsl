[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mcp2nlp2dsl"
version = "0.1.0"
description = "MCP server (stdio) — thin wrappers over dsl2nlp2dsl"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "dsl2nlp2dsl>=0.1.0",
    "nlp2nlp2dsl>=0.1.0",
    "mcp>=1.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[project.scripts]
mcp2nlp2dsl = "mcp2nlp2dsl.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
