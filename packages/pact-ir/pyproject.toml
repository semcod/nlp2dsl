[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pact-ir"
version = "0.1.0"
description = "Shared IntentIR and ExecutionPlanIR for nlp2cmd ↔ Propact integration"
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0"
dependencies = [
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src/pact_ir"]

[tool.hatch.build.targets.sdist]
include = ["src/pact_ir", "tests", "README.md"]

[tool.pytest.ini_options]
testpaths = ["tests"]
