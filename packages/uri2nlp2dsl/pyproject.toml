[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "uri2nlp2dsl"
version = "0.1.0"
description = "nlp2dsl:// URI → DSL line → dsl2nlp2dsl.dispatch()"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = ["dsl2nlp2dsl>=0.1.0"]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[project.scripts]
uri2nlp2dsl = "uri2nlp2dsl.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
