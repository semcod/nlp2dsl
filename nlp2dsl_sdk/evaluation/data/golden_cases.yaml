# Golden dataset — regression cases grouped by error class focus.
# Each case tests one primary failure mode for NLP→DSL lifecycle.

cases:
  # ── entity_extraction ─────────────────────────────────────────
  - id: g-entity-invoice-pl
    text: "Wystaw fakturę na 3200 PLN do dostawca@firma.pl"
    focus: entity_extraction
    expected_status: complete
    expected_actions: [send_invoice]
    mode: rules
    category: invoice

  - id: g-entity-invoice-en
    text: "Invoice for 890 USD to billing@corp.com"
    focus: entity_extraction
    expected_status: complete
    expected_actions: [send_invoice]
    mode: rules
    category: invoice

  - id: g-entity-email-reminder
    text: "Przypomnij dev@firma.pl o code review PR-442"
    focus: entity_extraction
    expected_status: complete
    expected_actions: [send_email]
    mode: rules
    category: email

  - id: g-entity-crm-lead
    text: "Zaktualizuj lead w CRM: firma ACME, status qualified, owner Jan Kowalski"
    focus: entity_extraction
    expected_status: complete
    expected_actions: [crm_update]
    mode: rules
    category: crm

  # ── dsl_mapping ───────────────────────────────────────────────
  - id: g-dsl-composite-invoice-slack
    text: "Wyślij fakturę 1500 PLN do klient@firma.pl i powiadom #billing na Slacku"
    focus: dsl_mapping
    expected_status: complete
    expected_actions: [send_invoice, notify_slack]
    mode: rules
    category: composite

  - id: g-dsl-report-email
    text: "Miesięczny raport finansów PDF i wyślij email do cfo@firma.pl"
    focus: dsl_mapping
    expected_status: complete
    expected_actions: [generate_report, send_email]
    mode: rules
    category: composite

  - id: g-dsl-full-report-flow
    text: "Co tydzień generuj raport sprzedaży PDF, wyślij email do manager@firma.pl i powiadom na Slack #sales"
    focus: dsl_mapping
    expected_status: complete
    expected_actions: [generate_report, send_email, notify_slack]
    mode: rules
    category: composite

  - id: g-dsl-report-slack
    text: "Raport kwartalny sprzedaży CSV i wyślij go na #analytics"
    focus: dsl_mapping
    expected_status: complete
    expected_actions: [generate_report, notify_slack]
    mode: rules
    category: composite

  # ── unnecessary_clarification (should NOT ask when data is present) ──
  - id: g-clarify-invoice-complete
    text: "Wyślij fakturę na 500 PLN do test@firma.pl"
    focus: unnecessary_clarification
    expected_status: complete
    expected_actions: [send_invoice]
    mode: rules
    category: invoice
    notes: "All required invoice fields present — must not stay incomplete."

  - id: g-clarify-slack-complete
    text: "Powiadom kanał #sales o podpisaniu umowy z klientem Beta Corp"
    focus: unnecessary_clarification
    expected_status: complete
    expected_actions: [notify_slack]
    mode: rules
    category: slack

  # ── expected incomplete (quality gate — NOT unnecessary clarify) ──
  - id: g-clarify-email-missing-body
    text: "Wyślij email do jan@example.com z tematem Podsumowanie tygodnia"
    focus: entity_extraction
    expected_status: incomplete
    expected_missing: [send_email.body]
    mode: rules
    category: email
    notes: "Body is quality-required — incomplete is correct."

  # ── attachment_validation focus (conversation / invoice path) ─
  - id: g-attach-invoice-with-amount
    text: "Chcę wysłać fakturę 1500 PLN na klient@firma.pl"
    focus: attachment_validation
    expected_status: complete
    expected_actions: [send_invoice]
    mode: rules
    category: invoice
    notes: "Attachment may be autogenerated via nested generate_invoice."
